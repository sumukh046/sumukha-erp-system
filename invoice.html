<!DOCTYPE html>
<html>
<head>
    <title>Tax Invoice</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        .invoice-container {
            width: 800px;
            margin: auto;
            border: 1px solid #000;
            padding: 20px;
        }

        h2 {
            margin: 0;
        }

        .invoice-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* Important Fix */
        }

        th, td {
            border: 1px solid #000;
            padding: 8px;
            text-align: center;
            box-sizing: border-box; /* Important Fix */
            word-wrap: break-word;
        }

        th {
            background-color: #f2f2f2;
        }

        .summary {
            width: 40%;
            margin-left: auto;
            margin-top: 20px;
        }

        .summary td {
            text-align: right;
        }

        .summary td:first-child {
            text-align: left;
        }

        .footer {
            margin-top: 80px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="invoice-container">

    <div class="invoice-header">
        <h2>Tax Invoice</h2>
        <div>
            <strong>Invoice No:</strong> Sumukha-2026-02-26<br>
            <strong>Date:</strong> 26-02-2026
        </div>
    </div>

    <table>
        <colgroup>
            <col style="width:25%">
            <col style="width:20%">
            <col style="width:15%">
            <col style="width:20%">
            <col style="width:20%">
        </colgroup>

        <thead>
            <tr>
                <th>Description</th>
                <th>HSN/SAC</th>
                <th>Qty</th>
                <th>Rate</th>
                <th>Amount</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Service Item</td>
                <td>9983</td>
                <td>2</td>
                <td>222.00</td>
                <td>444.00</td>
            </tr>
        </tbody>
    </table>

    <table class="summary">
        <tr>
            <td>Subtotal</td>
            <td>444.00</td>
        </tr>
        <tr>
            <td>CGST @9%</td>
            <td>39.96</td>
        </tr>
        <tr>
            <td>SGST @9%</td>
            <td>39.96</td>
        </tr>
        <tr>
            <td><strong>Total</strong></td>
            <td><strong>523.92</strong></td>
        </tr>
    </table>

    <div class="footer">
        <strong>for SUMUKHA FACILITATORS PRIVATE LIMITED</strong><br><br>
        Authorised Signatory
    </div>

</div>

</body>
</html>
